server:
  port: 8083

spring:
  datasource:
    url: ${ORDER_SERVICE_DB_URL}
    username: ${ORDER_SERVICE_DB_USERNAME}
    password: ${ORDER_SERVICE_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8082}