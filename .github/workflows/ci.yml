name: CI

on:
  push:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    

jobs:
  build:
    name: Build, Test and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build, test and generate coverage
        run: mvn clean verify
      
      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=omarandresvz_shopflow \
            -Dsonar.organization=omarandresvz \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=shared/target/site/jacoco/jacoco.xml,auth-service/target/site/jacoco/jacoco.xml,product-service/target/site/jacoco/jacoco.xml,order-service/target/site/jacoco/jacoco.xml
      
      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: |
            shared/target/site/jacoco
            auth-service/target/site/jacoco
            product-service/target/site/jacoco
            order-service/target/site/jacoco

      - name: Build Docker images
        run: docker compose build