server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**

            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/products/**

            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/orders/**

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info